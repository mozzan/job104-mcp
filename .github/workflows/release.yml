name: Release

# Triggers when pyproject.toml changes on main (i.e. a version bump).
on:
  push:
    branches: [main]
    paths: ['pyproject.toml']

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # need previous commit to diff the version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Detect version bump
        id: check
        run: |
          CURRENT=$(uv version --short)
          echo "current: $CURRENT"
          git checkout HEAD~1 -- pyproject.toml 2>/dev/null || true
          PREVIOUS=$(uv version --short 2>/dev/null || echo "0.0.0")
          git checkout HEAD -- pyproject.toml
          echo "previous: $PREVIOUS"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    permissions:
      contents: write   # create the GitHub release + tag
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run tests
        run: uv run pytest -v

      # PyPI first: if it fails, no tag/release is created pointing at a
      # version that was never published.
      - name: Build distributions
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Sync manifest.json version for the bundle
        run: |
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' manifest.json

      - name: Commit manifest.json version bump back to main
        run: |
          if git diff --quiet manifest.json; then
            echo "manifest.json already in sync"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "chore: sync manifest.json to v$VERSION [skip ci]"
            git push origin HEAD:main
          fi

      - name: Build .mcpb bundle
        run: |
          npx -y @anthropic-ai/mcpb validate manifest.json
          npx -y @anthropic-ai/mcpb pack .
          mv job104-mcp.mcpb job104-mcp-v$VERSION.mcpb

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: "job104-mcp v${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            *.mcpb
